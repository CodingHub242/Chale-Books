<div style="padding: 20px; text-align: center;">
  <h2>Import Expenses</h2>
  <p>Current Step: {{ currentStep }}</p>
  <ion-button style="position: absolute;top: 0;left: 90%;" (click)="close()"><ion-icon name="close"></ion-icon></ion-button>

  
  <div *ngIf="currentStep === 1">
    <p>Step 1: Upload</p>
    <div class="upload-area" 
         [class.dragover]="isDragOver"
         (click)="fileInput.click()"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave($event)"
         (drop)="onDrop($event)"
         style="border: 2px dashed #ccc; padding: 40px; border-radius: 12px; margin-top: 20px;">
      
      <input #fileInput type="file" 
             accept=".csv,.xlsx,.xls" 
             (change)="onFileSelected($event)" 
             style="display: none;">
      
      <p *ngIf="!selectedFile">Click to upload</p>
      <p *ngIf="selectedFile">{{ selectedFile.name }}</p>
    </div>
    
    <ion-button expand="block" 
                [disabled]="!selectedFile" 
                (click)="parseFile()"
                style="margin-top: 20px;">
      Next
    </ion-button>
  </div>

  <div *ngIf="currentStep === 2">
    <p>Step 2: Map Columns</p>
    <p>Headers found: {{ fileHeaders.length }}</p>
    <ion-button (click)="previousStep()">Back</ion-button>
    <ion-button (click)="validateData()">Next</ion-button>
  </div>

  <div *ngIf="currentStep === 3">
    <p>Step 3: Import</p>
    <p>Ready to import {{ validData.length }} expenses</p>
    <ion-button (click)="importExpenses()">Import</ion-button>
  </div>
</div>
